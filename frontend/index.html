<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Subastas - Grupo 9</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="../img/icono_subasta9.png" alt="Subastas Grupo 9" height="60">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Catálogo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pages/crear-subasta.html">Crear Subasta</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pages/mis-subastas.html">Mis Subastas</a>
                    </li>
                    <li class="nav-item" id="nav-admin">
                        <a class="nav-link fw-bold" href="pages/admin-dashboard.html"
                            style="color: var(--color-filtro);"><i class="bi bi-shield-lock me-1"></i>Administrador</a>
                    </li>
                </ul>
                <div class="d-flex ms-auto">
                    <span class="navbar-text me-3">Hola, Vendedor</span>
                    <button onclick="cerrarSesion()" class="btn btn-outline-light btn-sm">Salir</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="hero-section shadow-sm">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">Subastas en Tiempo Real</h1>
            <p class="lead mb-4">Descubrí oportunidades únicas en vehículos, inmuebles, hogar y mucho más.</p>
            <a href="#catalogo" class="btn btn-primary btn-lg px-5 fw-bold rounded-pill">Ver Catálogo</a>
        </div>
    </div>

    <div class="container" id="catalogo">
        <h2 class="mb-4">Catálogo de Subastas</h2>

        <!-- Pestañas de filtrado por estado usando Bootstrap -->
        <ul class="nav nav-pills mb-4" id="estadoTabs">
            <li class="nav-item">
                <button class="nav-link active" onclick="filtrarPorEstado('ACTIVA', this)">Vigentes</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="filtrarPorEstado('PUBLICADA', this)">Próximas</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="filtrarPorEstado('FINALIZADA', this)">Terminadas</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="filtrarPorEstado('CANCELADA', this)">Suspendidas</button>
            </li>
            <li class="nav-item ms-auto">
                <select class="form-select" id="filtroCategoria" onchange="filtrarCombinado()">
                    <option value="TODAS">Todas las categorías</option>
                    <option value="Inmuebles">Inmuebles</option>
                    <option value="Vehículos">Vehículos</option>
                    <option value="Hogar">Hogar</option>
                </select>
            </li>
        </ul>

        <!-- Contenedor donde se inyectarán las subastas -->
        <div id="subastas-container" class="row g-4">
            <!-- Loader (Se oculta al cargar los datos) -->
            <div class="text-center" id="loader">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p>Cargando subastas...</p>
            </div>
        </div>
    </div>

    <!-- Script de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Config y Auth -->
    <script src="js/api-config.js"></script>
    <!-- Nuestro Script -->
    <script src="js/app.js"></script>
</body>

</html>
