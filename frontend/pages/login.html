<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Subastas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-light">

    <!-- Navbar Reutilizado -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <img src="../../img/icono_subasta9.png" alt="Subastas Grupo 9" height="60">
            </a>
            <div class="d-flex ms-auto">
                <a href="login.html" class="btn btn-outline-light">Login</a>
            </div>
        </div>
    </nav>

    <!-- Formulario de Login -->
    <div class="container h-100" style="margin-top: 60px; max-width: 400px;">
        <div class="row h-100 justify-content-center align-items-center">
            <div class="col-sm-12">
                <div class="card shadow-sm border-0">

                    <div class="card-header bg-dark text-white text-center py-3">
                        <h3 class="card-title mb-0 fs-5">Iniciar Sesión</h3>
                    </div>

                    <form id="loginForm">
                        <div class="card-body p-4">
                            <div class="form-group mb-3">
                                <label for="loginEmail" class="form-label fw-bold">Email</label>
                                <input type="email" class="form-control" id="loginEmail"
                                    placeholder="Tu correo electrónico" required>
                            </div>
                            <div class="form-group mb-4">
                                <label for="loginPassword" class="form-label fw-bold">Contraseña</label>
                                <input type="password" class="form-control" id="loginPassword"
                                    placeholder="Tu contraseña" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mb-3 fw-bold">Ingresar</button>

                            <hr>

                            <!-- Redirección al Registro -->
                            <div class="text-center mt-3">
                                <p class="mb-2 text-muted small">¿No estás registrado?</p>
                                <a href="register.html" class="btn btn-sm btn-outline-secondary w-100">Crear una cuenta
                                    nueva</a>
                            </div>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <!-- Script de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            alert("En el futuro, esto validará con el backend de Spring Boot.");
            window.location.href = "index.html"; // Redirigir al inicio simulando éxito
        });
    </script>
</body>

</html>
