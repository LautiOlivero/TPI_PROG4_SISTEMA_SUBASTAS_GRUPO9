<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Subasta - Sistema de Subastas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-light">

    <!-- Navbar Reutilizado -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <img src="../../img/icono_subasta9.png" alt="Subastas Grupo 9" height="60">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Catálogo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="crear-subasta.html">Crear Subasta</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="mis-subastas.html">Mis Subastas</a>
                    </li>
                </ul>
                <div class="d-flex ms-auto">
                    <!-- Simulamos que ya está logueado -->
                    <span class="navbar-text me-3">Hola, Vendedor</span>
                    <button onclick="cerrarSesion()" class="btn btn-outline-light btn-sm">Salir</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Nueva Subasta</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="crearSubastaForm">

                            <!-- Sección 1: Producto -->
                            <h5 class="text-primary mb-3 border-bottom pb-2">1. Datos del Producto</h5>
                            <div class="row g-3 mb-4">
                                <div class="col-md-12">
                                    <label for="titulo" class="form-label fw-bold">Título del Producto</label>
                                    <input type="text" class="form-control" id="titulo"
                                        placeholder="Ej: Auto de Colección Ford Mustang 1969" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="categoria" class="form-label fw-bold">Categoría</label>
                                    <select class="form-select" id="categoria" required>
                                        <option value="" selected disabled>Seleccione una categoría...</option>
                                        <option value="Inmuebles">Inmuebles</option>
                                        <option value="Vehículos">Vehículos</option>
                                        <option value="Hogar">Hogar</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="imagenUrl" class="form-label fw-bold">URL de la Imagen</label>
                                    <input type="url" class="form-control" id="imagenUrl"
                                        placeholder="https://ejemplo.com/foto.jpg" required>
                                </div>
                                <div class="col-md-12">
                                    <label for="descripcion" class="form-label fw-bold">Descripción Detallada</label>
                                    <textarea class="form-control" id="descripcion" rows="3"
                                        placeholder="Describa el estado, características y detalles importantes..."
                                        required></textarea>
                                </div>
                            </div>

                            <!-- Sección 2: Subasta -->
                            <h5 class="text-primary mb-3 border-bottom pb-2">2. Configuración de la Subasta</h5>
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label for="precioBase" class="form-label fw-bold">Precio Base ($)</label>
                                    <div class="input-group">
                                        <span class="input-group-text">$</span>
                                        <input type="number" class="form-control" id="precioBase" min="1" step="0.01"
                                            required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label for="incrementoFijo" class="form-label fw-bold">Incremento Fijo por Puja
                                        ($)</label>
                                    <div class="input-group">
                                        <span class="input-group-text">$</span>
                                        <input type="number" class="form-control" id="incrementoFijo" min="1"
                                            step="0.01" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label for="fechaInicio" class="form-label fw-bold">Fecha y Hora de Inicio</label>
                                    <input type="datetime-local" class="form-control" id="fechaInicio" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="fechaCierre" class="form-label fw-bold">Fecha y Hora de Cierre</label>
                                    <input type="datetime-local" class="form-control" id="fechaCierre" required>
                                </div>
                            </div>

                            <!-- Acciones -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a href="mis-subastas.html" class="btn btn-outline-secondary px-4">Cancelar</a>
                                <button type="submit" class="btn btn-primary px-5 fw-bold"><i
                                        class="bi bi-save me-2"></i>Guardar Borrador</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 para alertas -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Config y Auth -->
    <script src="../js/api-config.js"></script>
    <!-- Nuestro Script -->
    <script src="../js/crear-subasta.js"></script>
</body>

</html>
