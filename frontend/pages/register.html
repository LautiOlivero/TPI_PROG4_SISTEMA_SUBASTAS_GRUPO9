<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema de Subastas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-light">

    <!-- Navbar Reutilizado -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <img src="../../img/icono_subasta9.png" alt="Subastas Grupo 9" height="60">
            </a>
            <div class="d-flex ms-auto">
                <a href="login.html" class="btn btn-outline-light">Login</a>
            </div>
        </div>
    </nav>

    <!-- Usuario -->
    <div class="container h-100" style="margin-top: 40px; max-width: 500px;">
        <div class="row h-100 justify-content-center align-items-center">
            <div class="col-sm-12">
                <div class="card shadow-sm border-0 card-primary card-personalizada">

                    <div class="card-header bg-primary text-white">
                        <h3 class="card-title mb-0 fs-5">Nuevo usuario</h3>
                    </div>

                    <form id="registerForm">
                        <div class="card-body">
                            <div class="alert alert-success d-none" id="registroExitoso">
                                ¡Registro exitoso! Ya podés iniciar sesión.
                            </div>

                            <div class="form-group mb-3">
                                <label for="registerInputName1" class="form-label fw-bold">Nombre</label>
                                <input type="text" name="nombre" class="form-control" id="registerInputName1"
                                    placeholder="Nombre completo" required />
                            </div>

                            <div class="form-group mb-3">
                                <label for="registerInputEmail1" class="form-label fw-bold">Email</label>
                                <input type="email" name="email" class="form-control" id="registerInputEmail1"
                                    placeholder="Email" required />
                            </div>

                            <div class="form-group mb-3">
                                <label for="registerInputPassword1" class="form-label fw-bold">Contraseña</label>
                                <input type="password" name="password" class="form-control" id="registerInputPassword1"
                                    placeholder="Mínimo 6 caracteres" required minlength="6" />
                            </div>
                        </div>

                        <div class="card-footer bg-white border-0 d-flex justify-content-between mb-2">
                            <a href="../index.html" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary" id="btnSubmit">Registrarse</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <!-- Script de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/register.js"></script>
</body>

</html>
